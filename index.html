<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111b21;color:#e9edef;font-family:'DM Sans',sans-serif;height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px;}
  .box{width:100%;max-width:320px;text-align:center;}
  .login-input{background:#2a3942;border:1.5px solid #2a3942;color:#e9edef;padding:13px 16px;border-radius:10px;font-size:0.95rem;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:10px;outline:none;transition:border-color 0.2s;}
  .login-input:focus{border-color:#e8547a;}
  .login-input::placeholder{color:#8696a0;}
  .login-btn{background:#e8547a;color:white;border:none;padding:14px;border-radius:10px;font-size:0.95rem;font-family:'DM Sans',sans-serif;font-weight:500;width:100%;cursor:pointer;margin-top:4px;}
  .login-btn:active{opacity:0.85;}
  .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(10px);background:#2a3942;color:#e9edef;padding:9px 18px;border-radius:20px;font-size:0.8rem;opacity:0;transition:all 0.25s;z-index:999;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="box">
  <input type="text" class="login-input" id="nameInput" placeholder="Naam..." maxlength="20" autofocus>
  <input type="password" class="login-input" id="pwInput" placeholder="Password..." maxlength="30" style="display:none;">
  <button class="login-btn" onclick="enterChat()">Shuru Karo →</button>
</div>
<div class="toast" id="toast"></div>

<script>
const ROOMS = { 'S': 'room_s', 'R': 'room_r', 'Priyanshu': 'dashboard' };
const S_PASS = '1234Qw@#';

// Show/hide password field based on name
document.getElementById('nameInput').addEventListener('input', () => {
  const val = document.getElementById('nameInput').value.trim().toLowerCase();
  const pwField = document.getElementById('pwInput');
  if (val === 's') {
    pwField.style.display = 'block';
  } else {
    pwField.style.display = 'none';
    pwField.value = '';
  }
});

function enterChat() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('Naam likho!'); return; }

  const key = Object.keys(ROOMS).find(k => k.toLowerCase() === name.toLowerCase());
  if (!key) { showToast('Naam sahi nahi hai!'); return; }

  // S ke liye password check
  if (key === 'S') {
    const pw = document.getElementById('pwInput').value.trim();
    if (!pw) { showToast('Password daalo!'); document.getElementById('pwInput').focus(); return; }
    if (pw !== S_PASS) { showToast('❌ Wrong password!'); document.getElementById('pwInput').value = ''; return; }
  }

  const room = ROOMS[key];
  if (room === 'dashboard') {
    window.location.href = 'dashboard.html';
  } else {
    window.location.href = 'chat.html?room=' + room + '&user=' + encodeURIComponent(key);
  }
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim().toLowerCase();
    if (val === 's' && document.getElementById('pwInput').style.display === 'none') {
      document.getElementById('pwInput').style.display = 'block';
      document.getElementById('pwInput').focus();
    } else {
      enterChat();
    }
  }
});
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterChat();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
