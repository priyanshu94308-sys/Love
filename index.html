<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111b21;
    --panel: #202c33;
    --input-bg: #2a3942;
    --sent: #005c4b;
    --recv: #202c33;
    --rose: #e8547a;
    --text: #e9edef;
    --muted: #8696a0;
    --border: #2a3942;
    --online: #25d366;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #loginScreen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; padding:28px; }
  .login-box { width:100%; max-width:320px; text-align:center; }
  .login-icon { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#e8547a,#a02050); display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin:0 auto 16px; }
  .login-box h2 { font-size:1.4rem; font-weight:600; margin-bottom:6px; }
  .login-box p { color:var(--muted); font-size:0.82rem; margin-bottom:24px; }
  .login-input { background:var(--input-bg); border:1.5px solid var(--border); color:var(--text); padding:13px 16px; border-radius:10px; font-size:0.95rem; font-family:'DM Sans',sans-serif; width:100%; margin-bottom:10px; outline:none; transition:border-color 0.2s; }
  .login-input:focus { border-color:#e8547a; }
  .login-input::placeholder { color:var(--muted); }
  .login-btn { background:#e8547a; color:white; border:none; padding:14px; border-radius:10px; font-size:0.95rem; font-family:'DM Sans',sans-serif; font-weight:500; width:100%; cursor:pointer; margin-top:4px; }
  .login-btn:active { opacity:0.85; }

  .chat-header { background:var(--panel); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; border-bottom:1px solid var(--border); }
  .avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#e8547a,#7b2d42); display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:700; color:white; text-transform:uppercase; flex-shrink:0; }
  .header-info { flex:1; min-width:0; }
  .header-info h3 { font-size:0.97rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .online-dot { font-size:0.7rem; color:var(--online); display:flex; align-items:center; gap:4px; margin-top:2px; }
  .online-dot::before { content:''; width:6px; height:6px; background:var(--online); border-radius:50%; }
  .offline-dot { font-size:0.7rem; color:var(--muted); margin-top:2px; }

  #clearBtn { display:none; background:rgba(232,84,122,0.12); border:1px solid rgba(232,84,122,0.4); color:#e8547a; padding:7px 11px; border-radius:8px; font-size:0.72rem; font-family:'DM Sans',sans-serif; cursor:pointer; white-space:nowrap; flex-shrink:0; margin-left:auto; }
  #clearBtn:active { background:rgba(232,84,122,0.25); }

  #messagesBox { flex:1; overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:4px; }
  #messagesBox::-webkit-scrollbar { width:3px; }
  #messagesBox::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-wrap { display:flex; flex-direction:column; max-width:75%; animation:fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-wrap.sent { align-self:flex-end; align-items:flex-end; }
  .msg-wrap.recv { align-self:flex-start; align-items:flex-start; }

  .msg-bubble { padding:8px 12px; border-radius:8px; font-size:0.88rem; line-height:1.5; word-break:break-word; }
  .sent .msg-bubble { background:var(--sent); border-bottom-right-radius:2px; }
  .recv .msg-bubble { background:var(--recv); border-bottom-left-radius:2px; border:1px solid var(--border); }

  .msg-photo { max-width:220px; max-height:260px; border-radius:8px; display:block; cursor:pointer; object-fit:cover; }
  .photo-bubble { padding:4px !important; }

  .msg-meta { font-size:0.65rem; color:var(--muted); margin-top:2px; padding:0 3px; display:flex; align-items:center; gap:3px; }
  .tick { font-size:0.7rem; color:var(--muted); }
  .tick.delivered { color:#25d366; }
  .msg-name { font-size:0.68rem; color:#e8547a; margin-bottom:2px; padding:0 3px; font-weight:500; }
  .date-div { text-align:center; color:var(--muted); font-size:0.68rem; margin:8px 0; background:rgba(32,44,51,0.8); padding:4px 12px; border-radius:8px; align-self:center; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); font-size:0.82rem; gap:8px; text-align:center; }
  .empty-state svg { opacity:0.3; }

  #typingIndicator { padding:3px 16px; font-size:0.72rem; color:var(--muted); min-height:18px; font-style:italic; }

  #uploadBar { display:none; padding:6px 16px; font-size:0.72rem; color:#e8547a; background:var(--panel); border-top:1px solid var(--border); flex-shrink:0; text-align:center; }

  .input-area { background:var(--panel); padding:8px 10px; padding-bottom:max(8px, env(safe-area-inset-bottom)); display:flex; align-items:flex-end; gap:8px; flex-shrink:0; border-top:1px solid var(--border); }
  .photo-btn { width:42px; height:42px; background:var(--input-bg); border:none; border-radius:50%; color:var(--muted); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .photo-btn:active { color:#e8547a; }
  #fileInput { display:none; }
  #msgInput { flex:1; background:var(--input-bg); border:none; color:var(--text); padding:11px 14px; border-radius:22px; font-size:0.9rem; font-family:'DM Sans',sans-serif; outline:none; resize:none; max-height:100px; line-height:1.4; }
  #msgInput::placeholder { color:var(--muted); }
  .send-btn { width:42px; height:42px; background:#e8547a; border:none; border-radius:50%; color:white; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .send-btn:active { opacity:0.8; }

  #photoOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; align-items:center; justify-content:center; }
  #photoOverlay.show { display:flex; }
  #photoOverlay img { max-width:95vw; max-height:92vh; border-radius:4px; object-fit:contain; }
  #closeOverlay { position:fixed; top:16px; right:16px; background:rgba(255,255,255,0.15); border:none; color:white; width:36px; height:36px; border-radius:50%; font-size:1.1rem; cursor:pointer; }

  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--panel); color:var(--text); padding:8px 18px; border-radius:20px; font-size:0.8rem; opacity:0; transition:all 0.25s; z-index:999; border:1px solid var(--border); white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">💬</div>
    <h2>Chat</h2>
    <p>Apna naam likho aur shuru karo</p>
    <input type="text" class="login-input" id="customName" placeholder="Naam..." maxlength="20" autofocus>
    <input type="password" class="login-input" id="adminPw" placeholder="Password (optional)..." maxlength="30">
    <button class="login-btn" onclick="enterChat()">Shuru Karo →</button>
  </div>
</div>

<div id="chatScreen" style="display:none;flex-direction:column;height:100dvh;">
  <div class="chat-header">
    <div class="avatar" id="headerAvatar">?</div>
    <div class="header-info">
      <h3 id="headerName">Chat</h3>
      <div id="onlineStatus" class="offline-dot">offline</div>
    </div>
    <button id="clearBtn" onclick="clearMyMessages()">🗑 Clear (10min)</button>
  </div>

  <div id="messagesBox">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Koi message nahi abhi tak</p>
    </div>
  </div>

  <div id="typingIndicator"></div>
  <div id="uploadBar">📤 Photo compress & upload ho rahi hai...</div>

  <div class="input-area">
    <button class="photo-btn" onclick="document.getElementById('fileInput').click()">📷</button>
    <input type="file" id="fileInput" accept="image/*">
    <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="photoOverlay">
  <button id="closeOverlay" onclick="document.getElementById('photoOverlay').classList.remove('show')">✕</button>
  <img id="overlayImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, onDisconnect, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJzOSIZfY1OBS372rzZK3NNO4W3VXV6GU",
  authDomain: "rplove-d8469.firebaseapp.com",
  databaseURL: "https://rplove-d8469-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rplove-d8469",
  storageBucket: "rplove-d8469.firebasestorage.app",
  messagingSenderId: "557495378550",
  appId: "1:557495378550:web:9262d90aa39a2463c0b557"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName = '';
let typingTimeout;
const ADMIN_PASS = 'rplove';

// Compress image to base64 (max 800px, quality 0.6)
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = h * MAX / w; w = MAX; }
        else if (h > MAX) { w = w * MAX / h; h = MAX; }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.enterChat = () => {
  const name = document.getElementById('customName').value.trim();
  if (!name) { showToast('Naam toh likho!'); return; }
  myName = name;

  const pw = document.getElementById('adminPw').value.trim();
  if (pw === ADMIN_PASS) {
    document.getElementById('clearBtn').style.display = 'block';
  }

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';

  initPresence();
  loadMessages();
  setupInput();
};

function initPresence() {
  const presRef = ref(db, `chat/presence/${myName}`);
  set(presRef, { online: true, name: myName });
  onDisconnect(presRef).set({ online: false, name: myName });

  onValue(ref(db, 'chat/presence'), snap => {
    const data = snap.val() || {};
    const others = Object.values(data).filter(u => u.name !== myName);
    const badge = document.getElementById('onlineStatus');
    const avatar = document.getElementById('headerAvatar');
    const hName = document.getElementById('headerName');

    if (others.length > 0) {
      const other = others[0];
      hName.textContent = other.name;
      avatar.textContent = other.name.charAt(0).toUpperCase();
      badge.className = other.online ? 'online-dot' : 'offline-dot';
      badge.textContent = other.online ? 'online' : 'last seen recently';
    } else {
      hName.textContent = 'Waiting...';
      avatar.textContent = '?';
      badge.className = 'offline-dot';
      badge.textContent = 'Link share karo';
    }
  });
}

function loadMessages() {
  onValue(ref(db, 'chat/messages'), snap => {
    const box = document.getElementById('messagesBox');
    const empty = document.getElementById('emptyState');
    const data = snap.val();

    if (!data) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    box.querySelectorAll('.msg-wrap,.date-div').forEach(el => el.remove());

    const msgs = Object.entries(data).sort((a, b) => a[1].ts - b[1].ts);
    let lastDate = '';

    msgs.forEach(([key, msg]) => {
      const d = new Date(msg.ts || Date.now());
      const dateStr = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });

      if (dateStr !== lastDate) {
        lastDate = dateStr;
        const div = document.createElement('div');
        div.className = 'date-div';
        div.textContent = dateStr;
        box.appendChild(div);
      }

      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${msg.name === myName ? 'sent' : 'recv'}`;

      const time = d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

      if (msg.name !== myName) {
        const nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = msg.name;
        wrap.appendChild(nameEl);
      }

      const bubble = document.createElement('div');

      if (msg.type === 'photo') {
        bubble.className = 'msg-bubble photo-bubble';
        const img = document.createElement('img');
        img.className = 'msg-photo';
        img.src = msg.data; // base64 data
        img.loading = 'lazy';
        img.onclick = () => {
          document.getElementById('overlayImg').src = msg.data;
          document.getElementById('photoOverlay').classList.add('show');
        };
        bubble.appendChild(img);
      } else {
        bubble.className = 'msg-bubble';
        bubble.textContent = msg.text;
      }

      wrap.appendChild(bubble);

      const meta = document.createElement('div');
      meta.className = 'msg-meta';

      const timeSpan = document.createElement('span');
      timeSpan.textContent = time;
      meta.appendChild(timeSpan);

      // Tick for sent messages
      if (msg.name === myName) {
        const tick = document.createElement('span');
        tick.className = msg.seen ? 'tick delivered' : 'tick';
        tick.textContent = msg.seen ? '✓✓' : '✓';
        meta.appendChild(tick);
      }

      wrap.appendChild(meta);

      box.appendChild(wrap);
    });

    box.scrollTop = box.scrollHeight;

    // Mark received messages as read (only if page is visible/active)
    if (myName && !document.hidden) {
      Object.entries(data).forEach(([key, msg]) => {
        if (msg.name !== myName && !msg.seen) {
          set(ref(db, 'chat/messages/' + key + '/seen'), true);
        }
      });
    }
  });
}

window.sendMessage = () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  push(ref(db, 'chat/messages'), { name: myName, text, type: 'text', ts: Date.now() });
  input.value = '';
  input.style.height = 'auto';
  clearTyping();
};

// Photo via base64 in Realtime DB
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) { showToast('Max 10MB photo select karo!'); return; }

  const bar = document.getElementById('uploadBar');
  bar.style.display = 'block';

  try {
    const base64 = await compressImage(file);
    await push(ref(db, 'chat/messages'), {
      name: myName,
      data: base64,
      type: 'photo',
      ts: Date.now()
    });
    showToast('Photo bhej di! 📸');
  } catch (err) {
    showToast('Photo error, dobara try karo');
    console.error(err);
  } finally {
    bar.style.display = 'none';
    e.target.value = '';
  }
});

window.clearMyMessages = async () => {
  if (!confirm('Last 10 minute ke apne saare messages delete karein?')) return;
  const cutoff = Date.now() - 10 * 60 * 1000;
  try {
    const snap = await get(ref(db, 'chat/messages'));
    const data = snap.val();
    if (!data) { showToast('Koi message nahi!'); return; }
    let count = 0;
    const dels = [];
    Object.entries(data).forEach(([key, msg]) => {
      if (msg.name === myName && msg.ts >= cutoff) {
        dels.push(remove(ref(db, `chat/messages/${key}`)));
        count++;
      }
    });
    await Promise.all(dels);
    showToast(count > 0 ? `${count} messages delete ho gaye!` : 'Last 10 min mein koi message nahi tha');
  } catch (err) {
    showToast('Error, dobara try karo');
  }
};

function setupInput() {
  const input = document.getElementById('msgInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    set(ref(db, `chat/typing/${myName}`), { typing: true });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(clearTyping, 2000);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
  });
  onValue(ref(db, 'chat/typing'), snap => {
    const data = snap.val() || {};
    const others = Object.entries(data).filter(([k, v]) => k !== myName && v.typing);
    document.getElementById('typingIndicator').textContent =
      others.length > 0 ? `${others[0][0]} likh raha/rahi hai...` : '';
  });
}

function clearTyping() {
  if (myName) set(ref(db, `chat/typing/${myName}`), { typing: false });
}

window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

document.addEventListener('visibilitychange', () => {
  if (document.hidden && myName) {
    clearTyping();
  } else if (!document.hidden && myName) {
    // Page became visible — mark all received messages as seen
    get(ref(db, 'chat/messages')).then(snap => {
      const data = snap.val();
      if (!data) return;
      Object.entries(data).forEach(([key, msg]) => {
        if (msg.name !== myName && !msg.seen) {
          set(ref(db, 'chat/messages/' + key + '/seen'), true);
        }
      });
    });
  }
});

document.getElementById('customName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('adminPw').focus();
});
document.getElementById('adminPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.enterChat();
});
</script>
</body>
</html>
